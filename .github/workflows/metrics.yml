name: Metrics

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Gakuus
          template: terminal
          config_hostname: 0
          config_animated: true
          base: |
            header:
              height: 160
              plugin: isocalendar
              isocalendar:
                format: full
                transform: rotate
          plugins: |
            isocalendar:
              enabled: true
              config:
                animation: rotate
            languages:
              enabled: true
              limit: 6
              detailed: true
            habits:
              enabled: true
              features:
                - chess
                - github
                - coding
                - languages
                - topics
            stargazers:
              enabled: true
              sections:
                - area
                - repository
              area:
                enabled: true
                style: round
            achievements:
              enabled: true
              display: compact
            lines:
              enabled: true
